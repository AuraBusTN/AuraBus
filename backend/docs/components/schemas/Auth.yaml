components:
  schemas:
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: "mario.rossi@email.com"
        password:
          type: string
          format: password
          example: "PasswordSegreta123!"

    SignupRequest:
      type: object
      required:
        - firstName
        - lastName
        - email
        - password
      properties:
        firstName:
          type: string
          example: "Mario"
        lastName:
          type: string
          example: "Rossi"
        email:
          type: string
          format: email
          example: "mario.rossi@email.com"
        password:
          type: string
          format: password
          description: "Minimum 6 characters"
          example: "PasswordSegreta123!"

    RefreshTokenRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          description: "Long-lived token received at login"
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

    GoogleLoginRequest:
      type: object
      required:
        - idToken
      properties:
        idToken:
          type: string
          description: "Google ID Token (JWT) obtained from Google Sign-In"
          example: "eyJhbGciOiJSUzI1NiIsImtpZCI6Ij..."

    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        accessToken:
          type: string
          description: "Short-lived token (1h) for API calls"
        refreshToken:
          type: string
          description: "Long-lived token (7 days) to renew the session"
        user:
          $ref: '#/components/schemas/User'

    RefreshTokenResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        accessToken:
          type: string
          description: "New valid Access Token"