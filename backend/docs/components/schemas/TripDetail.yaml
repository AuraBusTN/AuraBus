components:
  schemas:
    TripDetail:
      type: object
      properties:
        routeId:
          type: integer
          description: "Id of the route"
        routeShortName:
          type: string
          description: "Short name of the route"
        routeLongName:
          type: string
          description: "Full name of the route"
        routeColor:
          type: string
          example: "#00A88F"
          description: "Color associated with the route"
          nullable: true
        busId:
          type: integer
          description: "Id of the bus. Usually null because the trip has not begun yet"
          nullable: true
        busCapacity:
          type: integer
          description: "Capacity of the bus"
        busType:
          type: string
          enum:
            - mini
            - standard
            - standard_single
            - articulated
          description: "Type of the bus"
        occupancyRealTime:
          type: object
          description: "Occupancy information of the bus"
          properties:
            percentage:
              type: integer
              description: "Occupancy percentage of the bus"
            passengers:
              type: integer
              description: "Estimated number of passengers on the bus"
            level:
              type: string
              description: "Color representing the occupancy status (green, orange, red)"
        occupancyExpected:
          type: object
          description: "Expected occupancy information of the bus based on historical data"
          properties:
            percentage:
              type: integer
              description: "Expected occupancy percentage of the bus"
            passengers:
              type: integer
              description: "Expected number of passengers on the bus"
            level:
              type: string
              description: "Color representing the expected occupancy status (green, orange, red)"
        lastUpdate:
          type: string
          format: date-time
          description: "Timestamp of the last update for this trip. Null if the trip has not begun yet or there is no real-time data."
          nullable: true
        delay:
          type: integer
          nullable: true
          description: "Delay in minutes. It can be negative if the bus is ahead of schedule. Null if the bus has not begun its trip or there is no real-time data."
        lastStopId:
          type: integer
          description: "Id of the last stop the bus passed"
        nextStopId:
          type: integer
          description: "Id of the next stop the bus will pass"
        passedStopCount:
          type: integer
          description: "Number of stops the bus has already passed"
        arrivalTimeScheduled:
          type: string
          format: time
          example: "14:30:00"
          description: "Scheduled arrival time at the next stop"
        arrivalTimeEstimated:
          type: string
          format: time
          example: "14:32:00"
          description: "Estimated arrival time at the next stop. It is useful because it considers real-time delays"
        stopTimes:
          type: array
          description: "List of stop times for the trip"
          items:
            $ref: '#/components/schemas/StopTime'