/auth/signup:
  post:
    tags:
      - Authentication
    summary: Register a New User
    description: Returns Access Token (short-lived) and Refresh Token (long-lived).
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SignupRequest'
    responses:
      201:
        description: User created successfully
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthResponse'
      400:
        description: Validation error or existing email
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'

/auth/login:
  post:
    tags:
      - Authentication
    summary: Perform Login
    description: Returns Access Token (short-lived) and Refresh Token (long-lived).
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LoginRequest'
    responses:
      200:
        description: Login successful
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthResponse'
      401:
        description: Invalid credentials

/auth/google:
  post:
    tags:
      - Authentication
    summary: Login with Google
    description: Exchange a Google ID Token for AuraBus access/refresh tokens.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GoogleLoginRequest'
    responses:
      200:
        description: Google login successful
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthResponse'
      400:
        description: Validation error / token missing email
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      401:
        description: Unverified email or invalid token
      403:
        description: Google account mismatch for this email

/auth/refresh-token:
  post:
    tags:
      - Authentication
    summary: Renew Access Token
    description: Send a valid Refresh Token to obtain a new Access Token without logging in.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RefreshTokenRequest'
    responses:
      200:
        description: Token renewed
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenResponse'
      401:
        description: Missing Refresh Token
      403:
        description: Expired or invalid Refresh Token (perform new login)

/auth/logout:
  post:
    tags:
      - Authentication
    summary: Logout
    description: Invalidates the specific Refresh Token by removing it from the database.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RefreshTokenRequest'
    responses:
      204:
        description: Logout successful (No content returned)
      400:
        description: Missing Refresh Token

/auth/me:
  get:
    tags:
      - Authentication
    summary: User Profile
    description: Requires a valid Access Token.
    security:
      - bearerAuth: []
    responses:
      200:
        description: User data
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      401:
        description: Expired or missing token (Use refresh token)