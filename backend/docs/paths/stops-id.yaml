paths:
  /stops/{id}:
    get:
      summary: Ottieni dettagli di una specifica fermata
      tags: [Stops]
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: ID numerico della fermata
      responses:
        '200':
          description: Dettagli fermata restituiti con successo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Stop'
        
        '400':
          description: ID non valido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        
        '404':
          description: Fermata non trovata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

        '429':
          description: Troppe richieste
          headers:
            RateLimit-Limit:
              schema:
                type: integer
              description: Limite massimo richieste
            RateLimit-Remaining:
              schema:
                type: integer
              description: Richieste rimanenti
            RateLimit-Reset:
              schema:
                type: integer
              description: Secondi al reset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitError'

        '500':
          description: Errore interno del server (es. API esterne down)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'