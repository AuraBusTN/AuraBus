name: Backend CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'backend/**'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'backend/**'

jobs:
  test-backend:
    name: Test Backend (Docker + Jest)
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build the Docker image
        env:
          MONGO_USER: ${{ secrets.MONGO_USER }}
          MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
        run: docker compose build api

      - name: Create .env file
        run: |
          echo "NODE_ENV=test" > .env
          echo "MONGO_USER=${{ secrets.MONGO_USER }}" >> .env
          echo "MONGO_PASSWORD=${{ secrets.MONGO_PASSWORD }}" >> .env
          echo "MONGO_HOST=db" >> .env
          echo "API_URL=${{ secrets.API_URL }}" >> .env
          echo "API_USER=${{ secrets.API_USER }}" >> .env
          echo "API_PASSWORD=${{ secrets.API_PASSWORD }}" >> .env

      - name: Run tests with Jest (inside Docker)
        env:
          MONGO_USER: ${{ secrets.MONGO_USER }}
          MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
        run: |
          docker compose run --rm \
          -e MONGO_USER="${{ secrets.MONGO_USER }}" \
          -e MONGO_PASSWORD="${{ secrets.MONGO_PASSWORD }}" \
          -e MONGO_HOST="db" \
          -e API_URL="${{ secrets.API_URL }}" \
          -e API_USER="${{ secrets.API_USER }}" \
          -e API_PASSWORD="${{ secrets.API_PASSWORD }}" \
          api npm test